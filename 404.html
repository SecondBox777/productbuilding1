<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,follow" />
    <meta name="theme-color" content="#f4f0ea" />
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <title>페이지를 찾을 수 없습니다 | 테토/에겐 얼굴 분석기</title>
    <style>
      :root{--bg:#f4f0ea;--surface:#fffdf8;--text:#202124;--muted:#68635c;--line:#ded5c8;--accent:#1f7a64}*{box-sizing:border-box}body{display:grid;min-height:100vh;margin:0;place-items:center;padding:24px;background:var(--bg);color:var(--text);font-family:Pretendard,Inter,system-ui,sans-serif}.error-card{width:min(620px,100%);padding:clamp(28px,7vw,56px);border:1px solid var(--line);border-radius:14px;background:var(--surface);text-align:center}.code{margin:0;color:var(--accent);font-size:72px;font-weight:950;line-height:1}h1{margin:18px 0 12px;font-size:clamp(28px,6vw,42px)}p{margin:0;color:var(--muted);font-size:17px;line-height:1.8}.links{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-top:28px}.links a{padding:12px 16px;border-radius:8px;background:var(--accent);color:white;font-weight:800;text-decoration:none}.links a.secondary{border:1px solid var(--line);background:white;color:var(--text)}
    </style>
  </head>
  <body>
    <main class="error-card">
      <p class="code" aria-hidden="true">404</p>
      <h1>페이지를 찾을 수 없습니다</h1>
      <p>주소가 잘못 입력되었거나 페이지가 이동되었을 수 있습니다.<br />아래 링크에서 테토 에겐 얼굴 테스트와 이용 안내를 확인해 보세요.</p>
      <nav class="links" aria-label="도움이 되는 링크">
        <a href="/">얼굴 테스트로 돌아가기</a>
        <a class="secondary" href="/#guide">이용 가이드</a>
        <a class="secondary" href="/contact">문의하기</a>
      </nav>
    </main>
  </body>
</html>
