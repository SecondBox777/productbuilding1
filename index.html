<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>테토/에겐 얼굴 분석기</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f0ea;
        --surface: #fffdf8;
        --surface-strong: #ffffff;
        --text: #202124;
        --muted: #68635c;
        --line: #ded5c8;
        --teto: #e24d3f;
        --egen: #2d7dd2;
        --accent: #1f7a64;
        --shadow: 0 22px 70px rgba(45, 38, 30, 0.14);
      }

      body.dark {
        color-scheme: dark;
        --bg: #151719;
        --surface: #202326;
        --surface-strong: #262a2e;
        --text: #f4f0e8;
        --muted: #b7afa5;
        --line: #3a3f44;
        --accent: #48a585;
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(226, 77, 63, 0.16), transparent 32%),
          linear-gradient(225deg, rgba(45, 125, 210, 0.16), transparent 34%),
          var(--bg);
        color: var(--text);
        font-family:
          Pretendard, Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .utility-bar {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-bottom: 12px;
      }

      .utility-button {
        min-height: 36px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-strong);
        color: var(--text);
        font-size: 13px;
        font-weight: 800;
      }

      .shell {
        display: grid;
        grid-template-columns: minmax(0, 0.95fr) minmax(360px, 1.05fr);
        gap: 20px;
        align-items: stretch;
      }

      .intro,
      .analyzer {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.88);
        box-shadow: var(--shadow);
      }

      .intro {
        display: grid;
        min-height: 640px;
        overflow: hidden;
      }

      .visual {
        position: relative;
        min-height: 310px;
        background:
          radial-gradient(circle at 48% 28%, #fff 0 7%, transparent 7.4%),
          radial-gradient(circle at 35% 42%, rgba(226, 77, 63, 0.9) 0 5%, transparent 5.4%),
          radial-gradient(circle at 63% 42%, rgba(45, 125, 210, 0.9) 0 5%, transparent 5.4%),
          radial-gradient(circle at 50% 49%, #f4c7a1 0 23%, transparent 23.4%),
          linear-gradient(120deg, rgba(226, 77, 63, 0.28), rgba(45, 125, 210, 0.28));
        border-bottom: 1px solid var(--line);
      }

      .visual::before,
      .visual::after {
        position: absolute;
        top: 42%;
        width: 28%;
        height: 46%;
        border: 2px solid rgba(32, 33, 36, 0.18);
        border-radius: 50% 50% 44% 44%;
        background: rgba(255, 255, 255, 0.24);
        content: "";
      }

      .visual::before {
        left: 17%;
        transform: rotate(-10deg);
      }

      .visual::after {
        right: 17%;
        transform: rotate(10deg);
      }

      .scan-line {
        position: absolute;
        left: 11%;
        right: 11%;
        top: 48%;
        height: 3px;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, rgba(31, 122, 100, 0.86), transparent);
        box-shadow: 0 0 24px rgba(31, 122, 100, 0.45);
      }

      .intro-copy {
        padding: 30px;
      }

      h1 {
        margin: 0;
        font-size: clamp(36px, 6vw, 64px);
        line-height: 1.02;
        letter-spacing: 0;
        text-wrap: balance;
        word-break: keep-all;
      }

      html[lang="en"] h1 {
        max-width: 18ch;
        font-size: clamp(30px, 4.2vw, 48px);
        line-height: 1.08;
        letter-spacing: -0.035em;
      }

      .subtitle {
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.65;
      }

      .badges {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 24px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface-strong);
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .analyzer {
        padding: 22px;
      }

      .panel-title {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 16px;
      }

      h2 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .upload-zone {
        position: relative;
        display: grid;
        min-height: 330px;
        place-items: center;
        padding: 20px;
        border: 2px dashed #cfc3b5;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.62);
        text-align: center;
        transition:
          border-color 160ms ease,
          background 160ms ease,
          transform 160ms ease;
      }

      .upload-zone.dragging {
        border-color: var(--accent);
        background: rgba(31, 122, 100, 0.08);
        transform: translateY(-1px);
      }

      .upload-zone.has-image {
        padding: 0;
        border-style: solid;
        background: #151515;
      }

      .upload-empty {
        display: grid;
        gap: 14px;
        justify-items: center;
        color: var(--muted);
      }

      .upload-icon {
        display: grid;
        width: 78px;
        height: 78px;
        place-items: center;
        border-radius: 50%;
        background: #ebe4da;
        color: var(--text);
        font-size: 34px;
        font-weight: 900;
      }

      .upload-empty strong {
        color: var(--text);
        font-size: 20px;
      }

      #image-preview {
        display: none;
        width: 100%;
        max-height: 430px;
        object-fit: contain;
        border-radius: 6px;
      }

      .upload-zone.has-image #image-preview {
        display: block;
      }

      .upload-zone.has-image .upload-empty {
        display: none;
      }

      .analysis-overlay {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: none;
        place-items: center;
        border-radius: 6px;
        background: rgba(18, 20, 22, 0.72);
        color: white;
        text-align: center;
      }

      .analysis-overlay.active {
        display: grid;
      }

      .analysis-box {
        display: grid;
        gap: 10px;
        justify-items: center;
      }

      .analysis-spinner {
        width: 44px;
        height: 44px;
        border: 4px solid rgba(255, 255, 255, 0.28);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 900ms linear infinite;
      }

      .analysis-text {
        font-size: 18px;
        font-weight: 900;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #file-input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 14px;
      }

      .primary,
      .secondary {
        min-height: 48px;
        border-radius: 8px;
        font-weight: 800;
      }

      .primary {
        background: var(--accent);
        color: white;
        transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
      }

      .primary.share-ready {
        position: relative;
        overflow: hidden;
        background: linear-gradient(135deg, #ff704d, #df3f64 72%, #c92f67);
        box-shadow: 0 10px 24px rgba(201, 47, 103, 0.28);
        color: #fff;
      }

      .primary.share-ready::after {
        position: absolute;
        inset: 0;
        background: linear-gradient(110deg, transparent 20%, rgba(255, 255, 255, 0.28) 48%, transparent 76%);
        content: "";
        transform: translateX(-120%);
        animation: share-shine 2.8s ease-in-out infinite;
      }

      .primary.share-ready:hover:not(:disabled) {
        box-shadow: 0 13px 30px rgba(201, 47, 103, 0.38);
        filter: saturate(1.08);
        transform: translateY(-2px);
      }

      @keyframes share-shine {
        0%, 58% { transform: translateX(-120%); }
        88%, 100% { transform: translateX(120%); }
      }

      .primary:disabled,
      .secondary:disabled {
        cursor: not-allowed;
        opacity: 0.52;
      }

      .secondary {
        border: 1px solid var(--line);
        background: var(--surface-strong);
        color: var(--text);
      }

      .result-card {
        margin-top: 16px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-strong);
      }

      .result-main {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: end;
        margin-bottom: 16px;
      }

      .result-label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      #result-summary {
        margin: 0 0 14px;
        color: var(--text);
        font-size: 18px;
        font-weight: 900;
        line-height: 1.4;
      }

      #winner {
        margin-top: 4px;
        font-size: clamp(34px, 5vw, 54px);
        font-weight: 950;
        line-height: 1;
      }

      #confidence {
        color: var(--muted);
        font-size: 28px;
        font-weight: 900;
        white-space: nowrap;
      }

      .meter-list {
        display: grid;
        gap: 12px;
      }

      .meter-row {
        display: grid;
        gap: 7px;
      }

      .meter-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 14px;
        font-weight: 800;
      }

      .meter {
        height: 13px;
        overflow: hidden;
        border-radius: 999px;
        background: #eee7dd;
      }

      .meter-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
        transition: width 240ms ease;
      }

      .note {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 28px;
        z-index: 10;
        max-width: calc(100% - 32px);
        padding: 12px 16px;
        border-radius: 8px;
        background: var(--text);
        box-shadow: var(--shadow);
        color: var(--surface-strong);
        font-size: 14px;
        font-weight: 800;
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, 12px);
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .toast.visible {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .hidden {
        display: none;
      }

      @media (max-width: 860px) {
        .app {
          width: min(100% - 24px, 620px);
          padding: 18px 0;
        }

        .shell {
          grid-template-columns: 1fr;
        }

        .intro {
          min-height: auto;
        }

        .visual {
          min-height: 220px;
        }

        .intro-copy,
        .analyzer {
          padding: 18px;
        }

        .panel-title,
        .result-main {
          align-items: flex-start;
          flex-direction: column;
        }

        .status,
        #confidence {
          white-space: normal;
        }
      }

      @media (max-width: 480px) {
        html[lang="en"] h1 {
          max-width: none;
          font-size: clamp(28px, 9vw, 40px);
        }

        .actions {
          grid-template-columns: 1fr;
        }

        .upload-zone {
          min-height: 270px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .primary.share-ready::after {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="utility-bar" aria-label="site options">
        <button class="utility-button" id="theme-toggle" type="button">Dark mode</button>
        <button class="utility-button" id="language-toggle" type="button">English</button>

            <p class="subtitle" data-i18n="subtitle">

        <section class="analyzer">

            <span class="status" id="model-status" data-status="idle">모델 대기 중</span>
          </div>

          <label class="upload-zone" id="upload-zone" for="file-input">
            <img id="image-preview" alt="업로드한 얼굴 사진 미리보기" />

        </section>
      </section>
    </main>

        return Kakao.isInitialized();
      }

      function setStatus(key) {
        modelStatus.dataset.status = key;
        modelStatus.textContent = t(key);
      }

      function sleep(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));
      }

      function getClassKey(className) {
        const normalized = className.toLowerCase();
        if (normalized.includes("테토") || normalized.includes("teto")) return "teto";
        if (normalized.includes("에겐") || normalized.includes("egen")) return "egen";
        return null;
      }

      function getDisplayClassName(className) {
        const key = getClassKey(className);
        return key ? copy[currentLanguage].labels[key] : className;
      }

      function applyLanguage() {
        document.documentElement.lang = currentLanguage;
        document.querySelectorAll("[data-i18n]").forEach((element) => {
          element.textContent = t(element.dataset.i18n);
        });
        languageToggle.textContent = t("languageToggle");
        themeToggle.textContent = document.body.classList.contains("dark") ? t("lightMode") : t("darkMode");
        setStatus(modelStatus.dataset.status || "idle");
        if (latestPredictions && !resultCard.classList.contains("hidden")) {
          invalidateShareCard();
          renderPredictions(latestPredictions);
        } else {
          analyzeButton.textContent = t("analyzeButton");
        }
      }

      function showToast(message, duration = 3200) {
        window.clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add("visible");
        toastTimer = window.setTimeout(() => toast.classList.remove("visible"), duration);
      }

      function setPrimaryAction(action) {
        analyzeButton.dataset.action = action;
        analyzeButton.textContent = t(action === "share" ? "shareButton" : "analyzeButton");
        analyzeButton.classList.toggle("share-ready", action === "share");
      }

      function invalidateShareCard() {
        latestShareFile = null;
        shareCardPromise = null;
      }

      async function loadModel() {
        if (model) return model;

        setStatus("loading");
        analyzeButton.disabled = true;

        const modelURL = MODEL_URL + "model.json";
        const metadataURL = MODEL_URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        setStatus("ready");
        analyzeButton.disabled = !selectedImage;
        return model;
      }

      function setImage(file) {
        if (!file || !file.type.startsWith("image/")) return;

        const imageURL = URL.createObjectURL(file);
        imagePreview.onload = () => {
          URL.revokeObjectURL(imageURL);
          selectedImage = imagePreview;
          uploadZone.classList.add("has-image");
          analyzeButton.disabled = !model;
          resetButton.disabled = false;
          resultCard.classList.add("hidden");
          analysisOverlay.classList.remove("active");
          latestPredictions = null;
          invalidateShareCard();
          setPrimaryAction("analyze");
        };
        imagePreview.src = imageURL;
      }

      function resetImage() {
        selectedImage = null;
        fileInput.value = "";
        imagePreview.removeAttribute("src");
        uploadZone.classList.remove("has-image");
        analyzeButton.disabled = true;
        resetButton.disabled = true;
        resultCard.classList.add("hidden");
        analysisOverlay.classList.remove("active");
        latestPredictions = null;
        invalidateShareCard();
        setPrimaryAction("analyze");
      }

      function getResultColor(className) {
        const key = getClassKey(className);
        if (key === "teto") return "var(--teto)";
        if (key === "egen") return "var(--egen)";
        return "var(--accent)";
      }

      function buildSummary() {
        return t("complete");
      }

      function buildVerdict(className) {
        return t("verdict").replace("{type}", getDisplayClassName(className));
      }

      function renderPredictions(predictions) {
        latestPredictions = predictions;
        const sorted = [...predictions].sort((a, b) => b.probability - a.probability);
        const top = sorted[0];
        const percent = Math.round(top.probability * 100);

        resultSummary.textContent = buildSummary();
        winner.textContent = buildVerdict(top.className);
        winner.style.color = getResultColor(top.className);
        confidence.textContent = percent + "%";
        labelContainer.innerHTML = "";

        sorted.forEach((prediction) => {
          const row = document.createElement("div");
          row.className = "meter-row";

          const topLine = document.createElement("div");
          topLine.className = "meter-top";

          const name = document.createElement("span");
          name.textContent = getDisplayClassName(prediction.className);

          const value = document.createElement("span");
          value.textContent = Math.round(prediction.probability * 100) + "%";

          const meter = document.createElement("div");
          meter.className = "meter";

          const fill = document.createElement("div");
          fill.className = "meter-fill";
          fill.style.background = getResultColor(prediction.className);
          fill.style.width = prediction.probability * 100 + "%";

          topLine.append(name, value);
          meter.appendChild(fill);
          row.append(topLine, meter);
          labelContainer.appendChild(row);
        });

        resultCard.classList.remove("hidden");
        setPrimaryAction("share");
        prepareShareCard().catch((error) => console.error(error));
      }

      function buildShareData() {
        const sorted = [...latestPredictions].sort((a, b) => b.probability - a.probability);
        const top = sorted[0];
        const percent = Math.round(top.probability * 100);
        const text = `${t("shareIntro")} ${getDisplayClassName(top.className)} (${percent}%)!`;

        return {
          title: t("shareTitle"),
          text,
          url: SITE_URL,
        };
      }

      function drawRoundedRect(context, x, y, width, height, radius) {
        context.beginPath();
        context.roundRect(x, y, width, height, radius);
      }

      function drawCoverImage(context, image, x, y, width, height) {
        const imageWidth = image.naturalWidth || image.width;
        const imageHeight = image.naturalHeight || image.height;
        const imageRatio = imageWidth / imageHeight;
        const areaRatio = width / height;
        let sourceX = 0;
        let sourceY = 0;
        let sourceWidth = imageWidth;
        let sourceHeight = imageHeight;

        if (imageRatio > areaRatio) {
          sourceWidth = imageHeight * areaRatio;
          sourceX = (imageWidth - sourceWidth) / 2;
        } else {
          sourceHeight = imageWidth / areaRatio;
          sourceY = (imageHeight - sourceHeight) / 2;
        }

        context.drawImage(image, sourceX, sourceY, sourceWidth, sourceHeight, x, y, width, height);
      }

      function getCanvasResultColor(className) {
        const key = getClassKey(className);
        if (key === "teto") return "#e24d3f";
        if (key === "egen") return "#2d7dd2";
        return "#1f7a64";
      }

      async function createResultCardBlob() {
        const canvas = document.createElement("canvas");
        canvas.width = 1200;
        canvas.height = 1500;
        const context = canvas.getContext("2d");
        const sorted = [...latestPredictions].sort((a, b) => b.probability - a.probability);
        const top = sorted[0];
        const topPercent = Math.round(top.probability * 100);
        const accent = getCanvasResultColor(top.className);

        const background = context.createLinearGradient(0, 0, 1200, 1500);
        background.addColorStop(0, "#f9e7de");
        background.addColorStop(0.5, "#f4f0ea");
        background.addColorStop(1, "#e2ebf4");
        context.fillStyle = background;
        context.fillRect(0, 0, 1200, 1500);

        context.fillStyle = "#202124";
        context.font = "900 42px Pretendard, system-ui, sans-serif";
        context.fillText(currentLanguage === "ko" ? "테토/에겐 얼굴 분석기" : "Teto/Egen Face Analyzer", 72, 100);
        context.fillStyle = "#68635c";
        context.font = "700 23px Pretendard, system-ui, sans-serif";
        context.fillText(t("complete"), 72, 144);

        const privacyCanvas = document.createElement("canvas");
        privacyCanvas.width = 32;
        privacyCanvas.height = 20;
        drawCoverImage(privacyCanvas.getContext("2d"), selectedImage, 0, 0, 32, 20);

        context.save();
        drawRoundedRect(context, 72, 190, 1056, 610, 38);
        context.clip();
        context.filter = "blur(38px)";
        context.imageSmoothingEnabled = true;
        drawCoverImage(context, privacyCanvas, 32, 150, 1136, 690);
        context.filter = "none";
        const photoShade = context.createLinearGradient(0, 190, 0, 800);
        photoShade.addColorStop(0, "rgba(20, 22, 24, 0.12)");
        photoShade.addColorStop(1, "rgba(20, 22, 24, 0.62)");
        context.fillStyle = photoShade;
        context.fillRect(72, 190, 1056, 610);
        context.restore();

        context.fillStyle = "rgba(255, 255, 255, 0.92)";
        context.font = "700 21px Pretendard, system-ui, sans-serif";
        context.fillText("🔒 " + t("protectedPhoto"), 108, 675);

        context.save();
        context.shadowColor = "rgba(45, 38, 30, 0.16)";
        context.shadowBlur = 34;
        context.shadowOffsetY = 12;
        drawRoundedRect(context, 90, 710, 1020, 650, 36);
        context.fillStyle = "#fffdf8";
        context.fill();
        context.restore();

        context.fillStyle = "#68635c";
        context.font = "800 22px Pretendard, system-ui, sans-serif";
        context.fillText("MY RESULT", 142, 790);
        context.fillStyle = accent;
        context.font = "950 72px Pretendard, system-ui, sans-serif";
        context.fillText(getDisplayClassName(top.className), 142, 890);
        context.textAlign = "right";
        context.font = "950 70px Pretendard, system-ui, sans-serif";
        context.fillText(topPercent + "%", 1058, 890);
        context.textAlign = "left";
        context.fillStyle = "#202124";
        context.font = "900 34px Pretendard, system-ui, sans-serif";
        context.fillText(buildVerdict(top.className), 142, 950);

        sorted.slice(0, 3).forEach((prediction, index) => {
          const y = 1040 + index * 105;
          const percent = Math.round(prediction.probability * 100);
          context.fillStyle = "#383532";
          context.font = "800 24px Pretendard, system-ui, sans-serif";
          context.fillText(getDisplayClassName(prediction.className), 142, y);
          context.textAlign = "right";
          context.fillText(percent + "%", 1058, y);
          context.textAlign = "left";
          drawRoundedRect(context, 142, y + 24, 916, 18, 9);
          context.fillStyle = "#eee7dd";
          context.fill();
          if (percent > 0) {
            drawRoundedRect(context, 142, y + 24, Math.max(18, 916 * prediction.probability), 18, 9);
            context.fillStyle = getCanvasResultColor(prediction.className);
            context.fill();
          }
        });

        context.fillStyle = "#68635c";
        context.font = "700 20px Pretendard, system-ui, sans-serif";
        context.fillText(new URL(SITE_URL).host, 90, 1430);
        context.textAlign = "right";
        context.fillText(currentLanguage === "ko" ? "나도 분석해보기 →" : "Try it yourself →", 1110, 1430);

        return new Promise((resolve, reject) => {
          canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error("Image generation failed")), "image/png");
        });
      }

      function prepareShareCard() {
        if (latestShareFile) return Promise.resolve(latestShareFile);
        if (shareCardPromise) return shareCardPromise;

        shareCardPromise = createResultCardBlob()
          .then((blob) => {
            latestShareFile = new File([blob], "teto-egen-result.png", { type: "image/png" });
            return latestShareFile;
          })
          .catch((error) => {
            shareCardPromise = null;
            throw error;
          });
        return shareCardPromise;
      }

      function saveShareCard(file) {
        const imageURL = URL.createObjectURL(file);
        const link = document.createElement("a");
        link.href = imageURL;
        link.download = "teto-egen-result.png";
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(imageURL), 1000);
      }

      function isMobileDevice() {
        if (navigator.userAgentData && typeof navigator.userAgentData.mobile === "boolean") {
          return navigator.userAgentData.mobile;
        }
        return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      }

      async function copyShareText(shareData) {
        const content = `${shareData.text}\n${shareData.url}`;
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(content);
          return;
        }

        const textArea = document.createElement("textarea");
        textArea.value = content;
        textArea.setAttribute("readonly", "");
        textArea.style.position = "fixed";
        textArea.style.opacity = "0";
        document.body.appendChild(textArea);
        textArea.select();
        const copied = document.execCommand("copy");
        textArea.remove();
        if (!copied) throw new Error("Text copy failed");
      }

      async function shareResultOnDesktop(file, shareData) {
        await copyShareText(shareData);
        saveShareCard(file);
        showToast(t("desktopShared"), 6500);
      }

      async function shareResultWithKakao(file) {
        if (!initializeKakao()) throw new Error("Kakao SDK initialization failed");

        analyzeButton.textContent = t("kakaoSharing");
        const uploaded = await Kakao.Share.uploadImage({ file: [file] });
        const imageUrl = uploaded?.infos?.original?.url;
        if (!imageUrl) throw new Error("Kakao image upload failed");

        const sorted = [...latestPredictions].sort((a, b) => b.probability - a.probability);
        const top = sorted[0];
        const percent = Math.round(top.probability * 100);
        const type = getDisplayClassName(top.className);

        Kakao.Share.sendDefault({
          objectType: "feed",
          content: {
            title: currentLanguage === "ko"
              ? `내 분석 결과는 ${type} ${percent}%!`
              : `My result is ${type} ${percent}%!`,
            description: currentLanguage === "ko"
              ? "블러 처리된 사진과 전체 분석 결과를 확인해 보세요."
              : "See the privacy-blurred photo and full analysis result.",
            imageUrl,
            imageWidth: 1200,
            imageHeight: 1500,
            link: {
              mobileWebUrl: SITE_URL,
              webUrl: SITE_URL,
            },
          },
          buttons: [
            {
              title: currentLanguage === "ko" ? "나도 검사하기" : "Try the analyzer",
              link: {
                mobileWebUrl: SITE_URL,
                webUrl: SITE_URL,
              },
            },
          ],
        });
      }

      async function shareResult() {
        if (!latestPredictions || !selectedImage) return;

        const shareData = buildShareData();
        analyzeButton.disabled = true;
        try {
          let file = latestShareFile;
          if (!file) {
            analyzeButton.textContent = t("preparingShare");
            file = await prepareShareCard();
          }

          if (initializeKakao()) {
            await shareResultWithKakao(file);
            return;
          }

          const fileShareData = {
            files: [file],
            title: shareData.title,
            text: shareData.text,
          };
          const canShareFile = isMobileDevice() && navigator.share &&
            (!navigator.canShare || navigator.canShare({ files: [file] }));

          if (canShareFile) {
            await navigator.share(fileShareData);
          } else {
            await shareResultOnDesktop(file, shareData);
          }
        } catch (error) {
          if (error.name !== "AbortError") {
            console.error(error);
            showToast(window.Kakao ? t("kakaoSetupError") : t("shareFailed"), 6500);
          }
        } finally {
          analyzeButton.disabled = false;
          setPrimaryAction("share");
        }
      }

      async function analyzeImage() {
        if (!selectedImage) return;

        try {
          analyzeButton.disabled = true;
          analyzeButton.textContent = t("analyzingButton");
          analysisOverlay.classList.add("active");
          resultCard.classList.add("hidden");
          await loadModel();

          const [predictions] = await Promise.all([model.predict(selectedImage), sleep(1400)]);
          renderPredictions(predictions);
          await prepareShareCard();
        } catch (error) {
          console.error(error);
          setStatus("fail");
          alert(t("modelError"));
        } finally {
          analysisOverlay.classList.remove("active");
          setPrimaryAction(latestPredictions ? "share" : "analyze");
          analyzeButton.disabled = !selectedImage || !model;
        }
      }

      fileInput.addEventListener("change", (event) => {
        setImage(event.target.files[0]);
      });

      uploadZone.addEventListener("dragover", (event) => {
        event.preventDefault();
        uploadZone.classList.add("dragging");
      });

      uploadZone.addEventListener("dragleave", () => {
        uploadZone.classList.remove("dragging");
      });

      uploadZone.addEventListener("drop", (event) => {
        event.preventDefault();
        uploadZone.classList.remove("dragging");
        setImage(event.dataTransfer.files[0]);
      });

      analyzeButton.addEventListener("click", () => {
        if (analyzeButton.dataset.action === "share") {
          shareResult();
        } else {
          analyzeImage();
        }
      });
      resetButton.addEventListener("click", resetImage);
      themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        themeToggle.textContent = document.body.classList.contains("dark") ? t("lightMode") : t("darkMode");
      });
      languageToggle.addEventListener("click", () => {
        currentLanguage = currentLanguage === "ko" ? "en" : "ko";
        applyLanguage();
      });

      setPrimaryAction("analyze");
      applyLanguage();

      loadModel().catch((error) => {
        console.error(error);
        setStatus("needModel");
      });
    </script>
  </body>
</html>
