<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>테토/에겐 얼굴 분석기</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f6f3;
        --surface: #ffffff;
        --surface-soft: #eeeeea;
        --text: #151515;
        --muted: #686866;
        --line: #1f1f1d;
        --line-soft: #d7d7d1;
        --teto: #d94b3d;
        --egen: #276dc2;
        --accent: #151515;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(21, 21, 21, 0.035) 1px, transparent 1px),
          linear-gradient(rgba(21, 21, 21, 0.035) 1px, transparent 1px),
          var(--bg);
        background-size: 28px 28px;
        color: var(--text);
        font-family:
          Pretendard, Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0;
      }

      .shell {
        display: grid;
        grid-template-columns: minmax(0, 0.88fr) minmax(380px, 1.12fr);
        gap: 16px;
        align-items: stretch;
        border: 1px solid var(--line);
        background: var(--surface);
      }

      .intro,
      .analyzer {
        background: var(--surface);
      }

      .intro {
        display: grid;
        grid-template-rows: 1fr auto;
        min-height: 680px;
        overflow: hidden;
        border-right: 1px solid var(--line);
      }

      .visual {
        position: relative;
        min-height: 360px;
        background:
          linear-gradient(90deg, transparent 49.8%, var(--line) 49.8% 50.2%, transparent 50.2%),
          linear-gradient(transparent 49.8%, var(--line) 49.8% 50.2%, transparent 50.2%),
          var(--surface-soft);
        border-bottom: 1px solid var(--line);
      }

      .visual::before,
      .visual::after {
        position: absolute;
        border: 1px solid var(--line);
        background: var(--surface);
        content: "";
      }

      .visual::before {
        left: 12%;
        top: 18%;
        width: 56%;
        height: 58%;
        transform: none;
      }

      .visual::after {
        right: 12%;
        bottom: 16%;
        width: 44%;
        height: 42%;
        background:
          linear-gradient(90deg, transparent 49%, var(--line-soft) 49% 51%, transparent 51%),
          linear-gradient(transparent 49%, var(--line-soft) 49% 51%, transparent 51%),
          #f8f8f5;
        background-size: 22px 22px;
        transform: none;
      }

      .scan-line {
        position: absolute;
        left: 12%;
        right: 12%;
        top: 52%;
        z-index: 2;
        height: 1px;
        background: var(--line);
      }

      .intro-copy {
        padding: 28px;
      }

      h1 {
        margin: 0;
        max-width: 8.5em;
        font-size: clamp(40px, 6vw, 72px);
        font-weight: 850;
        line-height: 0.98;
        letter-spacing: 0;
      }

      .subtitle {
        max-width: 440px;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.75;
      }

      .badges {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0;
        margin-top: 28px;
        border: 1px solid var(--line);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 10px;
        border-right: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
        text-align: center;
      }

      .badge:last-child {
        border-right: 0;
      }

      .analyzer {
        padding: 28px;
      }

      .panel-title {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 18px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }

      h2 {
        margin: 0;
        font-size: 22px;
        font-weight: 820;
        letter-spacing: 0;
      }

      .status {
        min-height: 28px;
        display: inline-flex;
        align-items: center;
        padding: 0 10px;
        border: 1px solid var(--line);
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .upload-zone {
        position: relative;
        display: grid;
        min-height: 380px;
        place-items: center;
        padding: 20px;
        border: 1px solid var(--line);
        background:
          linear-gradient(90deg, rgba(21, 21, 21, 0.045) 1px, transparent 1px),
          linear-gradient(rgba(21, 21, 21, 0.045) 1px, transparent 1px),
          #f8f8f5;
        background-size: 18px 18px;
        text-align: center;
        transition:
          border-color 160ms ease,
          background 160ms ease,
          transform 160ms ease;
      }

      .upload-zone.dragging {
        border-color: var(--accent);
        background-color: #efefeb;
        transform: translateY(-1px);
      }

      .upload-zone.has-image {
        padding: 0;
        background: #111;
      }

      .upload-empty {
        display: grid;
        gap: 12px;
        justify-items: center;
        color: var(--muted);
      }

      .upload-icon {
        display: grid;
        width: 86px;
        height: 86px;
        place-items: center;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        font-size: 38px;
        font-weight: 300;
      }

      .upload-empty strong {
        color: var(--text);
        font-size: 18px;
        font-weight: 820;
      }

      #image-preview {
        display: none;
        width: 100%;
        max-height: 430px;
        object-fit: contain;
      }

      .upload-zone.has-image #image-preview {
        display: block;
      }

      .upload-zone.has-image .upload-empty {
        display: none;
      }

      #file-input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        margin-top: 12px;
        border: 1px solid var(--line);
      }

      .primary,
      .secondary {
        min-height: 52px;
        font-weight: 820;
      }

      .primary {
        background: var(--accent);
        color: white;
      }

      .primary:disabled,
      .secondary:disabled {
        cursor: not-allowed;
        opacity: 0.52;
      }

      .secondary {
        border-left: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
      }

      .result-card {
        margin-top: 12px;
        padding: 20px;
        border: 1px solid var(--line);
        background: var(--surface);
      }

      .result-main {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: end;
        margin-bottom: 16px;
      }

      .result-label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 820;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      #winner {
        margin-top: 8px;
        font-size: clamp(42px, 6vw, 68px);
        font-weight: 900;
        line-height: 1;
      }

      #confidence {
        color: var(--text);
        font-size: 34px;
        font-weight: 850;
        white-space: nowrap;
      }

      .meter-list {
        display: grid;
        gap: 12px;
      }

      .meter-row {
        display: grid;
        gap: 7px;
      }

      .meter-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 14px;
        font-weight: 800;
      }

      .meter {
        height: 16px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: var(--surface-soft);
      }

      .meter-fill {
        width: 0%;
        height: 100%;
        background: var(--accent);
        transition: width 240ms ease;
      }

      .note {
        margin: 16px 0 0;
        padding-top: 14px;
        border-top: 1px solid var(--line-soft);
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 860px) {
        .app {
          width: min(100% - 24px, 620px);
          padding: 12px 0;
        }

        .shell {
          grid-template-columns: 1fr;
          gap: 0;
        }

        .intro {
          min-height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .visual {
          min-height: 230px;
        }

        .intro-copy,
        .analyzer {
          padding: 18px;
        }

        .panel-title,
        .result-main {
          align-items: flex-start;
          flex-direction: column;
        }

        .status,
        #confidence {
          white-space: normal;
        }
      }

      @media (max-width: 480px) {
        .actions {
          grid-template-columns: 1fr;
        }

        .upload-zone {
          min-height: 270px;
        }

        .badges {
          grid-template-columns: 1fr;
        }

        .badge {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .badge:last-child {
          border-bottom: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="shell" aria-label="테토 에겐 얼굴 분석기">
        <aside class="intro">
          <div class="visual" aria-hidden="true">
            <div class="scan-line"></div>
          </div>
          <div class="intro-copy">
            <h1>테토/에겐 얼굴 분석기</h1>
            <p class="subtitle">
              얼굴 사진을 업로드하면 Teachable Machine 이미지 모델이 사진을 읽고 테토형인지
              에겐형인지 확률로 보여줍니다.
            </p>
            <div class="badges" aria-label="분석 특징">
              <span class="badge">Teachable Machine</span>
              <span class="badge">사진 업로드</span>
              <span class="badge">테토 vs 에겐</span>
            </div>
          </div>
        </aside>

        <section class="analyzer">
          <div class="panel-title">
            <h2>사진 분석</h2>
            <span class="status" id="model-status">모델 대기 중</span>
          </div>

          <label class="upload-zone" id="upload-zone" for="file-input">
            <img id="image-preview" alt="업로드한 얼굴 사진 미리보기" />
            <span class="upload-empty">
              <span class="upload-icon">+</span>
              <strong>얼굴 사진 업로드</strong>
              <span>JPG, PNG, WEBP 이미지를 선택하거나 끌어다 놓으세요.</span>
            </span>
            <input id="file-input" type="file" accept="image/*" />
          </label>

          <div class="actions">
            <button class="primary" id="analyze-button" type="button" disabled>분석하기</button>
            <button class="secondary" id="reset-button" type="button" disabled>다시 선택</button>
          </div>

          <article class="result-card hidden" id="result-card" aria-live="polite">
            <div class="result-main">
              <div>
                <div class="result-label">Result</div>
                <div id="winner">-</div>
              </div>
              <div id="confidence">0%</div>
            </div>
            <div class="meter-list" id="label-container"></div>
            <p class="note">
              이 결과는 업로드한 Teachable Machine 모델의 학습 데이터 기준 예측이며,
              실제 성격이나 정체성을 판단하는 용도가 아닙니다.
            </p>
          </article>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
      const MODEL_URL = "https://teachablemachine.withgoogle.com/models/60Qfr43G1/";

      let model;
      let selectedImage;
      let maxPredictions = 0;

      const modelStatus = document.getElementById("model-status");
      const uploadZone = document.getElementById("upload-zone");
      const fileInput = document.getElementById("file-input");
      const imagePreview = document.getElementById("image-preview");
      const analyzeButton = document.getElementById("analyze-button");
      const resetButton = document.getElementById("reset-button");
      const resultCard = document.getElementById("result-card");
      const winner = document.getElementById("winner");
      const confidence = document.getElementById("confidence");
      const labelContainer = document.getElementById("label-container");

      async function loadModel() {
        if (model) return model;

        modelStatus.textContent = "모델 불러오는 중";
        analyzeButton.disabled = true;

        const modelURL = MODEL_URL + "model.json";
        const metadataURL = MODEL_URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        modelStatus.textContent = "모델 준비 완료";
        analyzeButton.disabled = !selectedImage;
        return model;
      }

      function setImage(file) {
        if (!file || !file.type.startsWith("image/")) return;

        const imageURL = URL.createObjectURL(file);
        imagePreview.onload = () => {
          URL.revokeObjectURL(imageURL);
          selectedImage = imagePreview;
          uploadZone.classList.add("has-image");
          analyzeButton.disabled = !model;
          resetButton.disabled = false;
          resultCard.classList.add("hidden");
        };
        imagePreview.src = imageURL;
      }

      function resetImage() {
        selectedImage = null;
        fileInput.value = "";
        imagePreview.removeAttribute("src");
        uploadZone.classList.remove("has-image");
        analyzeButton.disabled = true;
        resetButton.disabled = true;
        resultCard.classList.add("hidden");
      }

      function getResultColor(className) {
        const normalized = className.toLowerCase();
        if (normalized.includes("테토") || normalized.includes("teto")) return "var(--teto)";
        if (normalized.includes("에겐") || normalized.includes("egen")) return "var(--egen)";
        return "var(--accent)";
      }

      function renderPredictions(predictions) {
        const sorted = [...predictions].sort((a, b) => b.probability - a.probability);
        const top = sorted[0];
        const percent = Math.round(top.probability * 100);

        winner.textContent = top.className;
        winner.style.color = getResultColor(top.className);
        confidence.textContent = percent + "%";
        labelContainer.innerHTML = "";

        sorted.forEach((prediction) => {
          const row = document.createElement("div");
          row.className = "meter-row";

          const topLine = document.createElement("div");
          topLine.className = "meter-top";

          const name = document.createElement("span");
          name.textContent = prediction.className;

          const value = document.createElement("span");
          value.textContent = Math.round(prediction.probability * 100) + "%";

          const meter = document.createElement("div");
          meter.className = "meter";

          const fill = document.createElement("div");
          fill.className = "meter-fill";
          fill.style.background = getResultColor(prediction.className);
          fill.style.width = prediction.probability * 100 + "%";

          topLine.append(name, value);
          meter.appendChild(fill);
          row.append(topLine, meter);
          labelContainer.appendChild(row);
        });

        resultCard.classList.remove("hidden");
      }

      async function analyzeImage() {
        if (!selectedImage) return;

        try {
          analyzeButton.disabled = true;
          analyzeButton.textContent = "분석 중";
          await loadModel();

          const predictions = await model.predict(selectedImage);
          renderPredictions(predictions);
        } catch (error) {
          console.error(error);
          modelStatus.textContent = "모델 로드 실패";
          alert("모델을 불러오지 못했습니다. Teachable Machine 모델 URL을 확인하세요.");
        } finally {
          analyzeButton.textContent = "분석하기";
          analyzeButton.disabled = !selectedImage || !model;
        }
      }

      fileInput.addEventListener("change", (event) => {
        setImage(event.target.files[0]);
      });

      uploadZone.addEventListener("dragover", (event) => {
        event.preventDefault();
        uploadZone.classList.add("dragging");
      });

      uploadZone.addEventListener("dragleave", () => {
        uploadZone.classList.remove("dragging");
      });

      uploadZone.addEventListener("drop", (event) => {
        event.preventDefault();
        uploadZone.classList.remove("dragging");
        setImage(event.dataTransfer.files[0]);
      });

      analyzeButton.addEventListener("click", analyzeImage);
      resetButton.addEventListener("click", resetImage);

      loadModel().catch((error) => {
        console.error(error);
        modelStatus.textContent = "모델 파일 필요";
      });
    </script>
  </body>
</html>
